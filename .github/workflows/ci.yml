# Lightweight CI on push/PR to main: just test + vet. Produces no artifacts,
# so it consumes no Actions storage — only run minutes (free tier for public repos).

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
